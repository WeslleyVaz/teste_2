<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda - GIRO LOKO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_venda.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold mx-auto" href="inicio.html">GIRO LOKO</a>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between mb-4">
            <a href="bikes.html" class="btn btn-outline-secondary">Escolher mais produtos</a>
            <button class="btn btn-success">Continuar</button>
        </div>

        <div class="caixa mb-4">
            <h2>Meu carrinho</h2>

            <div class="produto">
                <img src="../imagens/ouro.jpg" alt="Bike">

                <div class="info">
                    <h4>Bicicleta GIRO LOKO</h4>
                    <p>Marca: Giro Loko</p>
                </div>

                <div class="preco">
                    <strong>R$ 2.500,00</strong>
                </div>
            </div>
        </div>

        <div class="grid-baixo">
            <div class="caixa">
                <h2>Frete</h2>
                <div class="frete">
                    <input type="text" placeholder="Digite seu CEP">
                    <button>Buscar</button>
                </div>
            </div>

            <div class="caixa">
                <h2>Resumo do pedido</h2>

                <div class="linha">
                    <span>Produto</span>
                    <span>R$ 2.500,00</span>
                </div>

                <div class="linha total">
                    <span>Total</span>
                    <strong>R$ 2.500,00</strong>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
